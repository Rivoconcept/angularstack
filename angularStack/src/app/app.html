<header id="collection-header">
    <h1>My Collection</h1>
    <div>
        <app-search-bar 
        (searchButtonClicked)="incrementCount()"
        [search]="searchText"
        (searchChange)="searchText = $event"

    >
    </app-search-bar>
        Clicked_count: {{count}}<br>
        Search Text: {{searchText}}
    </div>
</header>
<section class="collection-grid">
    <app-playing-card [item]="linx"></app-playing-card>
    <app-playing-card  [item]="coin"></app-playing-card>
    <app-playing-card  [item]="itemList[selectedItemIndex()]"></app-playing-card>
    <app-playing-card  [item]="selectedItem()"></app-playing-card>
</section>
<button (click) = "incrementIndex()">Toggle</button>
